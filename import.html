<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Latiteam Supabase Import</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&display=swap"><style>body{margin:0;background:#f4f7fb;color:#13213c;font-family:Kanit,sans-serif}.wrap{max-width:760px;margin:50px auto;padding:20px}.card{background:#fff;border:1px solid #e1e7f0;border-radius:20px;padding:28px;box-shadow:0 20px 60px #17346718}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{display:grid;gap:6px;margin:12px 0;font-size:13px}input,button{font:inherit;padding:12px;border:1px solid #d9e0eb;border-radius:10px}button{background:#315bea;color:#fff;border:0;cursor:pointer}button:disabled{opacity:.5}pre{white-space:pre-wrap;background:#102349;color:#dce8ff;border-radius:12px;padding:16px;min-height:80px}.warn{color:#a14a15;background:#fff5e8;padding:12px;border-radius:10px}@media(max-width:600px){.row{grid-template-columns:1fr}.wrap{margin:10px auto}}</style></head><body><main class="wrap"><section class="card"><small>LATITEAM MIGRATION TOOL</small><h1>นำข้อมูลเข้า Supabase</h1><p class="warn">ใช้หน้านี้ครั้งเดียวด้วยบัญชี Admin แล้วลบไฟล์ <b>import.html</b> ออกจาก GitHub หลังย้ายเสร็จ</p><div class="row"><label>Username<input id="username" value="admin"></label><label>Password<input id="password" type="password"></label></div><button id="login">เข้าสู่ระบบ Supabase</button><label>ไฟล์ JSON ที่ Export จากระบบเดิม<input id="file" type="file" accept="application/json" disabled></label><button id="import" disabled>เริ่มนำเข้าข้อมูล</button><pre id="log">รอเข้าสู่ระบบ...</pre></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script>
const cfg=window.LATITEAM_SUPABASE_CONFIG,log=document.querySelector('#log'),financeKeys=['value','monthlyRevenue','billingType','cost','costStatus','wht','whtStatus','paid'];let db,payload;
const write=x=>log.textContent+=`\n${new Date().toLocaleString('th-TH')} · ${x}`;const check=r=>{if(r.error)throw r.error;return r.data};
document.querySelector('#login').onclick=async()=>{try{db=supabase.createClient(cfg.url,cfg.anonKey);const email=`${document.querySelector('#username').value.trim().toLowerCase()}@${cfg.usernameDomain}`;check(await db.auth.signInWithPassword({email,password:document.querySelector('#password').value}));const profile=check(await db.from('profiles').select('role').single());if(profile.role!=='admin')throw Error('ต้องใช้บัญชี Admin');document.querySelector('#file').disabled=false;log.textContent='เข้าสู่ระบบสำเร็จ เลือกไฟล์ JSON ได้'}catch(e){write('ERROR: '+e.message)}};
document.querySelector('#file').onchange=async e=>{try{payload=JSON.parse(await e.target.files[0].text());if(!Array.isArray(payload.projects))throw Error('รูปแบบไฟล์ไม่ถูกต้อง');write(`พบ ${payload.projects.length} โปรเจค, ${(payload.updates||[]).length} อัปเดต, ${(payload.standaloneEvents||[]).length} นัดหมาย`);document.querySelector('#import').disabled=false}catch(e){write('ERROR: '+e.message)}};
document.querySelector('#import').onclick=async()=>{const button=document.querySelector('#import');button.disabled=true;try{const {data:{user}}=await db.auth.getUser(),projectRows=[],financeRows=[];for(const source of payload.projects){const p=structuredClone(source),finance={};for(const key of financeKeys){finance[key]=p[key]??null;delete p[key]}projectRows.push({id:p.id,name:p.name,data:p,created_by:user.id});financeRows.push({project_id:p.id,data:finance})}check(await db.from('projects').upsert(projectRows));write('นำเข้าโปรเจคแล้ว');check(await db.from('project_finance').upsert(financeRows));write('นำเข้าข้อมูลการเงินแล้ว');const ids=projectRows.map(x=>x.id);if(ids.length)check(await db.from('project_updates').delete().in('project_id',ids));const updates=(payload.updates||[]).map(x=>({project_id:x.project,occurred_at:new Date(x.date||Date.now()).toISOString(),data:x}));if(updates.length)check(await db.from('project_updates').insert(updates));write('นำเข้าประวัติอัปเดตแล้ว');const events=(payload.standaloneEvents||[]).map(x=>({id:x.id||crypto.randomUUID(),project_id:x.projectId||null,event_date:x.date||null,data:x,created_by:user.id}));if(events.length)check(await db.from('events').upsert(events));write('เสร็จสมบูรณ์ สามารถเปิดเว็บไซต์หลักได้แล้ว')}catch(e){write('ERROR: '+e.message)}finally{button.disabled=false}};
</script></body></html>
